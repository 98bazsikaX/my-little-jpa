spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/dbmanager
    username: dbuser
    password: dbpass
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/db.changelog-master.xml
